<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paragon Core X</title>
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="images/icon.png">
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- KEEPING YOUR ORIGINAL MAP & DRAW STYLES --- */
        .map-frame { 
            width: 100%; border-radius: 16px; overflow: hidden; 
            border: 1px solid var(--border); background: #000; 
            position: relative; margin: 15px 0; padding: 80px 0;
            transition: background 0.3s ease; cursor: pointer;
        }
        .theme-light .map-frame { background: #ffffff; }
        #map-img, #sketch-canvas { width: 100%; display: block; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .map-frame.zoomed #map-img, .map-frame.zoomed #sketch-canvas { transform: scale(1.5); }
        #sketch-canvas { touch-action: none; background-size: contain; background-repeat: no-repeat; background-position: center; }
        .draw-tools { display: flex; gap: 12px; margin: 15px 0; padding: 10px; background: var(--input-bg); border-radius: 16px; border: 1px solid var(--border); justify-content: center; align-items: center; }
        .color-dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); cursor: pointer; }
        .draw-actions { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
        .draw-actions input { margin-bottom: 0 !important; flex: 2; }
        .draw-actions .save-btn { flex: 1; padding: 14px; font-size: 0.8rem; margin: 0; }
        .sub-nav { display: flex; gap: 5px; margin-top: 15px; background: var(--input-bg); padding: 5px; border-radius: 12px; }
        .sub-btn { flex: 1; padding: 12px; border: none; background: none; color: var(--sub-text); font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 0.85rem; }
        .sub-btn.active { background: var(--card-bg); color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* --- ADDING NEW LIVE VIEW STYLES --- */
        .live-grid { display: grid; gap: 10px; margin-top: 20px; }
        .match-card { background: var(--card-bg); padding: 15px; border-radius: 16px; border-left: 5px solid var(--primary); margin-bottom: 10px; }
        .live-tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-b { flex: 1; padding: 10px; border-radius: 10px; border: none; background: var(--input-bg); color: var(--text); font-size: 0.8rem; cursor: pointer; }
        .tab-b.active { background: var(--primary); color: #000; font-weight: bold; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .live-dot { color: #ff4d4d; animation: pulse 1.5s infinite; margin-right: 5px; }
    </style>
</head>
<body class="theme-dark style-classic">

<div class="container">
    <section id="view-hub" class="view active">
        <div class="welcome-header"><h1>Paragon Core X</h1><p>Strategic Command</p></div>
        
        <div class="hub-card" onclick="nav('home')"><b>Scout Notes</b></div>
        <div class="hub-card" onclick="nav('calc')"><b>Score Calculator</b></div>
        <div class="hub-card" onclick="nav('field')"><b>Field Viewer</b></div>
        
        <div class="hub-card" onclick="nav('live')" style="border: 1px solid rgba(255,77,77,0.3)">
            <span class="live-dot">●</span> <b>Live Events</b>
        </div>

        <div class="hub-card" onclick="openNew()"><b>New Match Report</b></div>
    </section>

    <section id="view-live" class="view">
        <button onclick="nav('hub')" style="background:none; border:none; color:var(--primary); font-weight:bold; margin-bottom:15px;">← BACK</button>
        <div class="welcome-header"><h1>Live<span>Event</span></h1><p id="refresh-status">Enter SKU</p></div>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input type="text" id="sku-input" placeholder="RE-VRC-24-XXXX" style="margin:0; flex:1;">
            <button class="save-btn" style="width:70px; padding:0;" onclick="startLiveRefresh()">GO</button>
        </div>
        <div class="live-tabs">
            <button class="tab-b active" onclick="switchLiveTab('matches')">Matches</button>
            <button class="tab-b" onclick="switchLiveTab('rankings')">Rankings</button>
            <button class="tab-b" onclick="switchLiveTab('skills')">Skills</button>
        </div>
        <div id="live-content" class="live-grid"></div>
    </section>

    <section id="view-field" class="view">
        <div class="welcome-header"><h1>Field Viewer</h1><p id="field-subtitle">Strategic Layout</p></div>
        <div class="sort-container">
            <button id="btn-field-match" class="sort-btn active" onclick="toggleMap('match')">MATCH</button>
            <button id="btn-field-skills" class="sort-btn" onclick="toggleMap('skills')">SKILLS</button>
        </div>
        <div id="standard-view">
            <div class="map-frame" id="std-frame" onclick="toggleZoom('std-frame')">
                <img id="map-img" src="images/field.png" alt="Field Map">
            </div>
        </div>
        <div id="draw-view" style="display:none;">
            <div class="map-frame zoomed" id="draw-frame"><canvas id="sketch-canvas"></canvas></div>
            <div class="draw-tools">
                <div class="color-dot" style="background:red" onclick="setPen('red')"></div>
                <div class="color-dot" style="background:blue" onclick="setPen('blue')"></div>
                <div class="color-dot" style="background:white" onclick="setPen('white')"></div>
                <div class="color-dot" style="background:yellow" onclick="setPen('yellow')"></div>
                <div class="color-dot" style="background:black; border: 1px solid #444;" onclick="setPen('black')"></div>
                <div style="width: 1px; height: 20px; background: var(--border); margin: 0 5px;"></div>
                <button onclick="clearCanvas()" style="background:none; border:none; color:var(--red); font-weight:bold; cursor:pointer; font-size:0.75rem;">CLEAR</button>
            </div>
            <div class="draw-actions">
                <input type="text" id="sketch-name" placeholder="Name strategy...">
                <button class="save-btn" onclick="saveSketch()">SAVE</button>
            </div>
        </div>
        <div id="saved-view" style="display:none; margin-top:10px;"><div id="sketch-list"></div></div>
        <div class="sub-nav">
            <button id="sub-std" class="sub-btn active" onclick="setFieldMode('standard')">VIEW</button>
            <button id="sub-draw" class="sub-btn" onclick="setFieldMode('draw')">DRAW</button>
            <button id="sub-saved" class="sub-btn" onclick="setFieldMode('saved')">SAVED</button>
        </div>
    </section>

    <section id="view-calc" class="view">...</section>
    <section id="view-home" class="view">...</section>
    <section id="view-settings" class="view">...</section>

    <section id="view-form" class="view">
        <h2>New Report</h2>
        <input type="hidden" id="editIdx">
        <input type="text" id="f-event" placeholder="Event Name">
        <input type="text" id="f-team" placeholder="Team Number">
        <div style="display:flex; gap:10px;">
            <select id="f-res"><option>Win</option><option>Loss</option><option>Tie</option></select>
            <select id="f-autores"><option>Auto Win</option><option>Auto Loss</option></select>
        </div>
        <input type="text" id="f-partner" placeholder="Partner Team">
        <input type="text" id="f-opp" placeholder="Opponent Teams">
        <div style="display:flex; gap:10px;">
            <input type="number" id="f-score" placeholder="Our Score">
            <input type="number" id="f-oppscore" placeholder="Opp Score">
        </div>
        <textarea id="f-notes" rows="5" placeholder="Strategic notes..."></textarea>
        <button class="save-btn" onclick="save()">SAVE REPORT</button>
    </section>

    <section id="view-detail" class="view"><button onclick="nav('home')">← BACK</button><h2 id="detName"></h2><div id="detHistory"></div></section>
</div>

<div class="dock-bar">
    <button class="dock-btn" onclick="nav('settings')">⚙</button>
    <button class="dock-btn alt" onclick="nav('hub')">⌂</button>
    <button class="dock-btn" id="fabBtn" onclick="toggleMenu()">^</button>
</div>

<script src="app.js"></script>
<script src="calc.js"></script>
<script src="view.js"></script>
<script src="live.js"></script>
</body>
</html>
